name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply coming-soon mode
        if: vars.COMING_SOON == 'true'
        run: |
          # Replace index with a minimal splash page.
          cat > src/content/docs/index.mdx << 'EOF'
          ---
          title: Vertex
          description: A modern programming language for Salesforce development. Coming soon.
          template: splash
          hero:
            title: Vertex
            tagline: A modern programming language for Salesforce development. Coming soon — stay tuned.
          ---
          EOF

          # Remove all other content so no other pages are generated.
          find src/content/docs -name "*.mdx" ! -name "index.mdx" -delete
          find src/content/docs -mindepth 1 -type d | xargs rm -rf

          # Swap in the minimal coming-soon Astro config.
          cp astro.config.coming-soon.mjs astro.config.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
